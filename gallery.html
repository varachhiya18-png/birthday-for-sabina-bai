<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memories | Sabina Bai ❤️</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    background:linear-gradient(135deg,#ff6fa8,#ff9dc7,#ffdce9);
}

.gallery-title{
    text-align:center;
    color:white;
    font-size:50px;
    margin-top:40px;
}

.gallery-sub{
    text-align:center;
    color:white;
    font-size:18px;
    margin-bottom:40px;
}

.gallery{
    width:90%;
    max-width:1200px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:25px;
    padding-bottom:50px;
}

.gallery img{
    width:100%;
    height:350px;
    object-fit:cover;
    border-radius:20px;
    cursor:pointer;
    transition:.4s;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

.gallery img:hover{
    transform:scale(1.05);
}

.lightbox{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.9);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.lightbox img{
    width:90%;
    max-width:800px;
    border-radius:20px;
}

.close{
    position:absolute;
    top:20px;
    right:30px;
    color:white;
    font-size:40px;
    cursor:pointer;
}

.btn-next{
    display:block;
    width:220px;
    margin:40px auto;
    text-align:center;
    padding:16px;
    border-radius:50px;
    background:white;
    color:#ff2d75;
    text-decoration:none;
    font-weight:bold;
}

</style>

</head>
<body>

<h1 class="gallery-title">📸 Beautiful Memories</h1>

<p class="gallery-sub
    <p class="gallery-sub">
Every picture tells a beautiful story ❤️
</p>

<div class="gallery">

<img src="sabina1.jpg.jpeg" onclick="openImg(this.src)">
<img src="sabina2.jpg.jpeg" onclick="openImg(this.src)">
<img src="sabina3.jpg.jpeg" onclick="openImg(this.src)">
<img src="sabina4.jpg.jpeg" onclick="openImg(this.src)">
<img src="sabina5.jpg.jpeg" onclick="openImg(this.src)">
<img src="image18.jpg.jpeg" onclick="openImg(this.src)">

</div>
